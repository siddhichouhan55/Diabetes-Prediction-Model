<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diabetes Prediction System</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <script defer
        src="{{ url_for('static', filename='script.js') }}"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="header">

        <i class="fa-solid fa-heart-pulse"></i>

        <h1>Diabetes Prediction System</h1>

        <p>Enter the patient's health information to predict diabetes risk.</p>

    </div>


<form action="/predict" method="POST" id="predictionForm">

<div class="grid">

<div class="input-box">

<label>
<i class="fa-solid fa-person"></i>
Pregnancies
</label>

<input
type="number"
step="1"
min="0"
name="Pregnancies"
placeholder="Enter Pregnancies"
required>

</div>



<div class="input-box">

<label>
<i class="fa-solid fa-droplet"></i>
Glucose
</label>

<input
type="number"
step="any"
name="Glucose"
placeholder="Enter Glucose"
required>

</div>



<div class="input-box">

<label>
<i class="fa-solid fa-heart-circle-bolt"></i>
Blood Pressure
</label>

<input
type="number"
step="any"
name="BloodPressure"
placeholder="Enter Blood Pressure"
required>

</div>



<div class="input-box">

<label>
<i class="fa-solid fa-ruler"></i>
Skin Thickness
</label>

<input
type="number"
step="any"
name="SkinThickness"
placeholder="Enter Skin Thickness"
required>

</div>



<div class="input-box">

<label>
<i class="fa-solid fa-syringe"></i>
Insulin
</label>

<input
type="number"
step="any"
name="Insulin"
placeholder="Enter Insulin"
required>

</div>



<div class="input-box">

<label>
<i class="fa-solid fa-weight-scale"></i>
BMI
</label>

<input
type="number"
step="0.1"
name="BMI"
placeholder="Enter BMI"
required>

</div>



<div class="input-box">

<label>
<i class="fa-solid fa-dna"></i>
Diabetes Pedigree Function
</label>

<input
type="number"
step="0.001"
name="DiabetesPedigreeFunction"
placeholder="Enter DPF"
required>

</div>



<div class="input-box">

<label>
<i class="fa-solid fa-calendar"></i>
Age
</label>

<input
type="number"
step="1"
min="1"
name="Age"
placeholder="Enter Age"
required>

</div>

</div>



<div class="buttons">

<button class="predict-btn" type="submit">

<i class="fa-solid fa-stethoscope"></i>

Predict

</button>


<button class="reset-btn" type="reset">

<i class="fa-solid fa-rotate-left"></i>

Reset

</button>

</div>

</form>



{% if prediction %}

<div class="result-card {{ color }}">

<h2>

Prediction Result

</h2>

<h1>

{{ prediction }}

</h1>

{% if confidence %}

<p>

Confidence :
<b>{{ confidence }}%</b>

</p>

{% endif %}

</div>

{% endif %}



<div class="footer">

<p>

Developed using Flask • Machine Learning • Python

</p>

</div>

</div>

</body>

</html>
